services:
  postgres:
    image: postgres:16-alpine
    container_name: workpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: workpilot
      POSTGRES_PASSWORD: workpilot
      POSTGRES_DB: workpilot
    ports:
      - "5432:5432"
    volumes:
      - workpilot_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: workpilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  workpilot_pg_data:
